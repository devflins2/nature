<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Vision | Premium Media Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.4);
            --bg: #0b0f19;
            --card-bg: #161d2f;
            --glass: rgba(255, 255, 255, 0.03);
            --text: #ffffff;
            --text-dim: #94a3b8;
            --accent: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(16, 185, 129, 0.08) 0, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(59, 130, 246, 0.08) 0, transparent 40%);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            line-height: 1.6;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.25rem;
            text-transform: uppercase;
            background: linear-gradient(135deg, #10b981, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .stats-badge {
            background: var(--glass);
            padding: 0.4rem 0.8rem;
            border-radius: 12px;
            font-size: 0.75rem;
            border: 1px solid var(--glass);
            color: var(--primary);
            font-weight: 700;
        }

        .hero {
            padding: 3rem 5% 2rem;
            text-align: center;
        }

        .hero h1 {
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .hero p {
            color: var(--text-dim);
            font-size: 0.95rem;
            max-width: 500px;
            margin: 0 auto 2rem;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            overflow-x: auto;
            padding: 0.5rem;
            scrollbar-width: none;
        }

        .tabs::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: var(--glass);
            border: 1px solid var(--glass);
            color: var(--text-dim);
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 8px 16px var(--primary-glow);
            border-color: transparent;
        }

        .gallery-container {
            padding: 0 5% 4rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        @media (max-width: 480px) {
            .grid { grid-template-columns: 1fr; }
            .hero { padding-top: 2rem; }
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--glass);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: rgba(16, 185, 129, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .media-wrapper {
            aspect-ratio: 16/10;
            overflow: hidden;
            background: #000;
            position: relative;
        }

        .media-wrapper img, .media-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            padding: 1rem;
        }

        .card-title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 0.3rem;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        /* Modal Viewer */
        #viewer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #viewer-content {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .close-viewer {
            position: absolute;
            top: 20px; right: 20px;
            width: 44px; height: 44px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .viewer-title {
            margin-top: 15px;
            color: white;
            font-weight: 600;
            text-align: center;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 5rem 0;
            color: var(--text-dim);
        }

        /* Loading */
        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid var(--glass);
            border-bottom-color: var(--primary);
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">NATURE VISION</div>
        <div id="total-count" class="stats-badge">...</div>
    </header>

    <div id="viewer" onclick="closeViewer()">
        <button class="close-viewer">&times;</button>
        <div id="viewer-media-container" style="display:contents"></div>
        <div class="viewer-title" id="viewer-title"></div>
    </div>

    <section class="hero">
        <h1>Nature Library</h1>
        <p>Premium visualization of your personal nature media collection.</p>
        
        <div class="tabs">
            <button class="tab-btn active" data-tab="images" onclick="switchTab('images')">Images</button>
            <button class="tab-btn" data-tab="videos" onclick="switchTab('videos')">Videos</button>
            <button class="tab-btn" data-tab="all" onclick="switchTab('all')">All Library</button>
            <button class="tab-btn" data-tab="logs" onclick="switchTab('logs')">System Logs</button>
        </div>
    </section>

    <main class="gallery-container">
        <div id="gallery-grid" class="grid"></div>
    </main>

    <script>
        let currentTab = 'images';
        let mediaData = { images: [], videos: [], all: [] };

        async function loadData() {
            try {
                const response = await fetch('/api/media');
                const data = await response.json();
                mediaData.images = data.images || [];
                mediaData.videos = data.videos || [];
                mediaData.all = [...mediaData.images, ...mediaData.videos].sort((a, b) => 
                    new Date(b.uploadedAt) - new Date(a.uploadedAt)
                );
                renderGallery();
                updateStats();
            } catch (error) {
                console.error("Fetch error:", error);
            }
        }

        function renderGallery() {
            if (currentTab === 'logs') {
                updateLogs();
                return;
            }

            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '';
            const items = mediaData[currentTab];
            
            if (!items || items.length === 0) {
                grid.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;">No media found in this category.</div>';
                return;
            }

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openViewer(item);
                
                const isSkipped = item.cloudinaryUrl === 'skipped_due_to_size';
                let mediaHtml;

                if (currentTab === 'images' || (currentTab === 'all' && !item.cloudinaryUrl.includes('.mp4'))) {
                    mediaHtml = `<img src="${item.cloudinaryUrl}" loading="lazy">`;
                } else {
                    if (isSkipped) {
                        mediaHtml = `<div style="height:100%; display:flex; align-items:center; justify-content:center; background:#161d2f; color:var(--primary); font-weight:bold;">📽️ Telegram Large File</div>`;
                    } else {
                        mediaHtml = `<video muted onmouseover="this.play()" onmouseout="this.pause()"><source src="${item.cloudinaryUrl}#t=0.1" type="video/mp4"></video>`;
                    }
                }

                card.innerHTML = `
                    <div class="media-wrapper">${mediaHtml}</div>
                    <div class="card-content">
                        <div class="card-title">${item.title || 'Nature Clip'}</div>
                        <div class="card-meta">
                            <span>${new Date(item.uploadedAt).toLocaleDateString()}</span>
                            <span>${item.cloudinaryFormat || 'MP4'}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function updateLogs() {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '<div id="log-container" style="grid-column: 1/-1; background: #000; padding: 1.5rem; border-radius: 1rem; font-family: monospace; font-size: 0.85rem; max-height: 500px; overflow-y: auto; color: #10b981;">Loading logs...</div>';
            
            try {
                const response = await fetch('/api/logs');
                const logs = await response.json();
                const container = document.getElementById('log-container');
                container.innerHTML = logs.length === 0 ? 'No logs available.' : logs.map(l => `
                    <div style="margin-bottom: 0.4rem;">
                        <span style="color: #64748b;">[${l.time}]</span> ${l.message}
                    </div>
                `).join('');
            } catch (err) {
                console.error("Log fetch failed", err);
            }
        }

        function openViewer(item) {
            const viewer = document.getElementById('viewer');
            const container = document.getElementById('viewer-media-container');
            const title = document.getElementById('viewer-title');
            
            const isVideo = item.cloudinaryUrl.includes('.mp4') || item.cloudinaryUrl === 'skipped_due_to_size';
            
            if (item.cloudinaryUrl === 'skipped_due_to_size') {
                container.innerHTML = `<div style="color:white; text-align:center; padding:2rem;">This video is > 100MB and is stored on your Telegram group.</div>`;
            } else if (isVideo) {
                container.innerHTML = `<video id="viewer-content" controls autoplay><source src="${item.cloudinaryUrl}" type="video/mp4"></video>`;
            } else {
                container.innerHTML = `<img id="viewer-content" src="${item.cloudinaryUrl}">`;
            }
            
            title.innerText = item.title || 'Media Preview';
            viewer.style.display = 'flex';
        }

        function closeViewer() {
            document.getElementById('viewer').style.display = 'none';
            document.getElementById('viewer-media-container').innerHTML = '';
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
            renderGallery();
        }

        function updateStats() {
            document.getElementById('total-count').innerText = `${mediaData.all.length} Items`;
        }

        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
