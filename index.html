<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nature Vision | Luxury Media Portfolio</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.4);
            --bg: #05070a;
            --card-bg: #111827;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-dim: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(16, 185, 129, 0.08) 0, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(59, 130, 246, 0.08) 0, transparent 40%);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            padding-bottom: 90px;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(5, 7, 10, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            text-transform: uppercase;
            background: linear-gradient(135deg, #10b981, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            letter-spacing: -0.5px;
        }

        .stats-badge {
            background: var(--glass);
            padding: 0.4rem 0.8rem;
            border-radius: 12px;
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: 700;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 450px;
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            display: flex;
            justify-content: space-around;
            padding: 0.6rem;
            z-index: 1000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.65rem;
            font-weight: 600;
            padding: 0.7rem;
            border-radius: 20px;
            flex: 1;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            gap: 4px;
        }

        .nav-item.active {
            color: var(--primary);
            background: rgba(16, 185, 129, 0.1);
            transform: translateY(-5px);
        }

        .nav-item i {
            width: 20px;
            height: 20px;
        }

        .gallery-container {
            padding: 1.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.2rem;
        }

        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; }
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            transition: all 0.4s ease;
            opacity: 0;
            transform: translateY(20px);
        }

        .card.visible { opacity: 1; transform: translateY(0); }
        .card:active { transform: scale(0.96); }

        .media-wrapper {
            aspect-ratio: 1/1;
            background: #090b11;
            position: relative;
            overflow: hidden;
        }

        .media-wrapper img, .media-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            padding: 1rem;
        }

        .card-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.2rem;
        }

        .card-meta {
            font-size: 0.7rem;
            color: var(--text-dim);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        #viewer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        #viewer-content {
            max-width: 100%;
            max-height: 100%;
        }

        .video-timeline {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 4px;
            background: rgba(255,255,255,0.1);
        }

        .video-progress {
            height: 100%; width: 0;
            background: var(--primary);
        }

        .close-viewer {
            position: absolute;
            top: 25px; right: 25px;
            width: 48px; height: 48px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            color: white;
            z-index: 2100;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        #load-more-trigger {
            padding: 3rem 0;
            text-align: center;
            color: var(--primary);
            font-weight: 600;
            font-size: 0.9rem;
            grid-column: 1/-1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid var(--glass);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Login Form Styles */
        .login-container {
            grid-column: 1 / -1;
            max-width: 400px;
            margin: 4rem auto;
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(40px);
            text-align: center;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .login-container h2 {
            margin-bottom: 2rem;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-input {
            width: 100%;
            padding: 1rem 1.5rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: white;
            margin-bottom: 1.2rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .login-input:focus {
            border-color: var(--primary);
            background: rgba(16, 185, 129, 0.05);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            margin-top: 0.5rem;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px var(--primary-glow);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-error {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 1.5rem;
            display: none;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">NATURE VISION</div>
        <div id="total-count" class="stats-badge">
            <i data-lucide="layers"></i>
            <span id="count-text">...</span>
        </div>
    </header>

    <div id="viewer">
        <button class="close-viewer" onclick="closeViewer()"><i data-lucide="x"></i></button>
        <div id="viewer-media-container" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;" onclick="closeViewer()"></div>
        <div class="video-timeline" id="timeline"><div class="video-progress" id="progress"></div></div>
    </div>

    <main class="gallery-container">
        <div id="gallery-grid" class="grid"></div>
        <div id="load-more-trigger">
            <div class="spinner"></div>
            <span>Discovering Nature...</span>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" data-tab="images" onclick="switchTab('images')">
            <i data-lucide="image"></i>
            <span>Images</span>
        </div>
        <div class="nav-item" data-tab="videos" onclick="switchTab('videos')">
            <i data-lucide="play-circle"></i>
            <span>Videos</span>
        </div>
        <div class="nav-item" data-tab="all" onclick="switchTab('all')">
            <span style="font-size:1.1rem; font-weight:bold">∞</span>
            <span>All</span>
        </div>
        <div class="nav-item" data-tab="logs" onclick="handleLogTab()">
            <i data-lucide="terminal"></i>
            <span>Logs</span>
        </div>
    </nav>

    <script>
        let currentTab = 'images';
        let mediaData = { images: [], videos: [], all: [] };
        let offset = { images: 0, videos: 0, all: 0 };
        let isLoading = false;
        let hasMore = { images: true, videos: true, all: true };
        let authenticated = false;
        const LIMIT = 40;

        // Initialize Lucide Icons
        lucide.createIcons();

        function getOptimizedUrl(url, type) {
            if (!url || url === 'skipped_due_to_size') return url;
            if (type === 'video') return url.replace('/upload/', '/upload/f_auto,q_auto,w_800,c_limit/');
            return url.replace('/upload/', '/upload/f_auto,q_auto,w_400,c_limit/');
        }

        async function fetchMore() {
            if (isLoading || !hasMore[currentTab]) return;
            isLoading = true;
            
            try {
                const response = await fetch(`/api/media?limit=${LIMIT}&offset=${offset[currentTab]}`);
                const data = await response.json();
                
                const newItems = currentTab === 'images' ? (data.images || []) : 
                               (currentTab === 'videos' ? (data.videos || []) : 
                               [...(data.images || []), ...(data.videos || [])]);
                
                if (newItems.length < LIMIT) hasMore[currentTab] = false;
                mediaData[currentTab].push(...newItems);
                offset[currentTab] += LIMIT;
                renderNewItems(newItems);
                updateStats();
            } catch (error) {
                console.error("Fetch error:", error);
            } finally {
                isLoading = false;
            }
        }

        function renderNewItems(items) {
            const grid = document.getElementById('gallery-grid');
            items.forEach((item) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openViewer(item);
                
                const isVideo = item.cloudinaryUrl.includes('.mp4') || item.type === 'videos';
                const optimizedUrl = getOptimizedUrl(item.cloudinaryUrl, isVideo ? 'video' : 'image');
                
                let mediaHtml;
                if (!isVideo) {
                    mediaHtml = `<img src="${optimizedUrl}" loading="lazy">`;
                } else {
                    if (item.cloudinaryUrl === 'skipped_due_to_size') {
                        mediaHtml = `<div style="height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#161d2f; color:var(--primary); font-weight:800; font-size:0.6rem; gap:5px;">
                            <i data-lucide="cloud-off"></i>
                            <span>TELEGRAM</span>
                        </div>`;
                    } else {
                        mediaHtml = `<video muted loop playsinline preload="auto"><source src="${optimizedUrl}#t=0.5" type="video/mp4"></video>`;
                    }
                }

                card.innerHTML = `
                    <div class="media-wrapper">${mediaHtml}</div>
                    <div class="card-content">
                        <div class="card-title">${item.title || 'Discovery'}</div>
                        <div class="card-meta">
                            <i data-lucide="calendar" style="width:10px;height:10px"></i>
                            <span>${new Date(item.uploadedAt).toLocaleDateString(undefined, {month:'short', day:'numeric'})}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
                lucide.createIcons({attrs:{'stroke-width':3}});
                setTimeout(() => card.classList.add('visible'), 50);
            });
        }

        function switchTab(tab) {
            if (currentTab === tab && tab !== 'logs') return;
            currentTab = tab;
            document.querySelectorAll('.nav-item').forEach(item => item.classList.toggle('active', item.dataset.tab === tab));
            document.getElementById('gallery-grid').innerHTML = '';
            
            if (tab === 'logs') {
                if (!authenticated) {
                    renderLoginForm();
                } else {
                    updateLogs();
                }
                return;
            }

            document.getElementById('load-more-trigger').style.display = 'flex';

            if (mediaData[tab].length === 0) {
                offset[tab] = 0;
                hasMore[tab] = true;
                fetchMore();
            } else {
                renderNewItems(mediaData[tab]);
            }
        }

        async function handleLogTab() {
            if (currentTab === 'logs') return;
            switchTab('logs');
        }

        function renderLoginForm() {
            const grid = document.getElementById('gallery-grid');
            document.getElementById('load-more-trigger').style.display = 'none';
            grid.innerHTML = `
                <div class="login-container">
                    <i data-lucide="shield-check" style="width:48px; height:48px; color:var(--primary); margin-bottom:1.5rem;"></i>
                    <h2>Security Required</h2>
                    <input type="text" id="admin-user" class="login-input" placeholder="Username">
                    <input type="password" id="admin-pass" class="login-input" placeholder="Password">
                    <button onclick="handleLogin()" class="login-btn">Verify Identity</button>
                    <div id="login-error" class="login-error">Access Denied: Invalid Credentials</div>
                </div>
            `;
            lucide.createIcons();
        }

        async function handleLogin() {
            const user = document.getElementById('admin-user').value;
            const pass = document.getElementById('admin-pass').value;
            const btn = document.querySelector('.login-btn');
            const errorEl = document.getElementById('login-error');
            
            btn.innerText = "Verifying...";
            btn.disabled = true;
            errorEl.style.display = 'none';
            
            try {
                const response = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user, pass })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    authenticated = true;
                    updateLogs();
                } else {
                    errorEl.style.display = 'block';
                    btn.innerText = "Verify Identity";
                    btn.disabled = false;
                }
            } catch (err) {
                errorEl.style.display = 'block';
                errorEl.innerText = "Server Unreachable";
                btn.innerText = "Verify Identity";
                btn.disabled = false;
            }
        }

        async function updateLogs() {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '<div id="log-container" style="grid-column: 1/-1; background: #000; padding: 2rem; border-radius: 24px; font-family: monospace; font-size: 0.8rem; max-height: 500px; overflow-y: auto; color: #10b981; border: 1px solid var(--glass-border); line-height:1.5;">Loading Engine Logs...</div>';
            const res = await fetch('/api/logs');
            const logs = await res.json();
            document.getElementById('log-container').innerHTML = logs.map(l => `<div style="margin-bottom:0.6rem;"><span style="color:#64748b;">[${l.time}]</span> ${l.message}</div>`).join('');
        }

        function openViewer(item) {
            const viewer = document.getElementById('viewer');
            const container = document.getElementById('viewer-media-container');
            const isVideo = item.cloudinaryUrl.includes('.mp4') || item.type === 'videos';
            container.innerHTML = '';
            document.getElementById('timeline').style.display = isVideo ? 'block' : 'none';

            if (isVideo && item.cloudinaryUrl !== 'skipped_due_to_size') {
                const video = document.createElement('video');
                video.id = 'viewer-content';
                video.src = item.cloudinaryUrl;
                video.autoplay = true; video.loop = true; video.playsInline = true;
                video.ontimeupdate = () => {
                    const prog = (video.currentTime / video.duration) * 100;
                    document.getElementById('progress').style.width = prog + '%';
                };
                container.appendChild(video);
            } else if (item.cloudinaryUrl === 'skipped_due_to_size') {
                container.innerHTML = `<div style="color:white; text-align:center;">
                    <i data-lucide="send" style="width:50px;height:50px;margin-bottom:15px;color:var(--primary)"></i>
                    <h2>Stored on Telegram</h2>
                    <p style="color:var(--text-dim);font-size:0.9rem;margin-top:10px;">This file is too large for web preview.</p>
                </div>`;
                lucide.createIcons();
            } else {
                const img = document.createElement('img');
                img.id = 'viewer-content';
                img.src = item.cloudinaryUrl;
                container.appendChild(img);
            }
            viewer.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeViewer() {
            document.getElementById('viewer').style.display = 'none';
            document.getElementById('viewer-media-container').innerHTML = '';
            document.body.style.overflow = 'auto';
        }

        function updateStats() {
            const total = mediaData.images.length + mediaData.videos.length;
            document.getElementById('count-text').innerText = `${total} Items`;
        }

        window.onscroll = () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) fetchMore();
        };

        fetchMore();
    </script>
</body>
</html>
