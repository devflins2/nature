<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nature Vision | Luxury Media Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.4);
            --bg: #05070a;
            --card-bg: #111827;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-dim: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(16, 185, 129, 0.08) 0, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(59, 130, 246, 0.08) 0, transparent 40%);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            padding-bottom: 90px; /* Space for bottom nav */
        }

        /* Top Header */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(5, 7, 10, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 0.8rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            text-transform: uppercase;
            background: linear-gradient(135deg, #10b981, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            letter-spacing: -0.5px;
        }

        .stats-badge {
            background: var(--glass);
            padding: 0.4rem 0.8rem;
            border-radius: 12px;
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: 700;
            border: 1px solid var(--glass-border);
        }

        /* Floating Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            justify-content: space-around;
            padding: 0.6rem;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.5rem;
            border-radius: 16px;
            flex: 1;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .nav-item.active {
            color: var(--primary);
            background: rgba(16, 185, 129, 0.1);
        }

        .nav-item i {
            font-size: 1.2rem;
            margin-bottom: 2px;
        }

        /* Gallery Grid */
        .gallery-container {
            padding: 1.2rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 Columns for Mobile */
            gap: 1rem;
        }

        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            transition: transform 0.3s ease;
            opacity: 0;
            transform: translateY(15px);
        }

        .card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .card:active { transform: scale(0.95); }

        .media-wrapper {
            aspect-ratio: 1/1;
            background: #090b11;
            position: relative;
            overflow: hidden;
        }

        .media-wrapper img, .media-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            padding: 0.8rem;
        }

        .card-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.2rem;
        }

        .card-meta {
            font-size: 0.65rem;
            color: var(--text-dim);
            font-weight: 500;
        }

        /* Viewer */
        #viewer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        #viewer-content {
            max-width: 100%;
            max-height: 100%;
        }

        .video-timeline {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 4px;
            background: rgba(255,255,255,0.1);
        }

        .video-progress {
            height: 100%; width: 0;
            background: var(--primary);
        }

        #load-more-trigger {
            padding: 2rem 0;
            text-align: center;
            color: var(--primary);
            font-weight: 600;
            font-size: 0.9rem;
            grid-column: 1/-1;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">NATURE VISION</div>
        <div id="total-count" class="stats-badge">...</div>
    </header>

    <div id="viewer" onclick="closeViewer()">
        <div id="viewer-media-container" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;"></div>
        <div class="video-timeline" id="timeline"><div class="video-progress" id="progress"></div></div>
    </div>

    <main class="gallery-container">
        <div id="gallery-grid" class="grid"></div>
        <div id="load-more-trigger">✨ Exploring nature...</div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" data-tab="images" onclick="switchTab('images')">
            <span style="font-size:1.2rem">🖼️</span>
            <span>Images</span>
        </div>
        <div class="nav-item" data-tab="videos" onclick="switchTab('videos')">
            <span style="font-size:1.2rem">📽️</span>
            <span>Videos</span>
        </div>
        <div class="nav-item" data-tab="all" onclick="switchTab('all')">
            <span style="font-size:1.2rem">💎</span>
            <span>All</span>
        </div>
        <div class="nav-item" data-tab="logs" onclick="handleLogTab()">
            <span style="font-size:1.2rem">📜</span>
            <span>Logs</span>
        </div>
    </nav>

    <script>
        let currentTab = 'images';
        let mediaData = { images: [], videos: [], all: [] };
        let offset = { images: 0, videos: 0, all: 0 };
        let isLoading = false;
        let hasMore = { images: true, videos: true, all: true };
        let authenticated = false;
        const LIMIT = 40;

        function getOptimizedUrl(url, type) {
            if (!url || url === 'skipped_due_to_size') return url;
            if (type === 'video') return url.replace('/upload/', '/upload/f_auto,q_auto,w_800,c_limit/');
            return url.replace('/upload/', '/upload/f_auto,q_auto,w_400,c_limit/');
        }

        async function fetchMore() {
            if (isLoading || !hasMore[currentTab]) return;
            isLoading = true;
            
            try {
                const response = await fetch(`/api/media?limit=${LIMIT}&offset=${offset[currentTab]}`);
                const data = await response.json();
                
                const newItems = currentTab === 'images' ? (data.images || []) : 
                               (currentTab === 'videos' ? (data.videos || []) : 
                               [...(data.images || []), ...(data.videos || [])]);
                
                if (newItems.length < LIMIT) hasMore[currentTab] = false;
                mediaData[currentTab].push(...newItems);
                offset[currentTab] += LIMIT;
                renderNewItems(newItems);
                updateStats();
            } catch (error) {
                console.error("Fetch error:", error);
            } finally {
                isLoading = false;
            }
        }

        function renderNewItems(items) {
            const grid = document.getElementById('gallery-grid');
            items.forEach((item) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openViewer(item);
                
                const isVideo = item.cloudinaryUrl.includes('.mp4') || item.type === 'videos';
                const optimizedUrl = getOptimizedUrl(item.cloudinaryUrl, isVideo ? 'video' : 'image');
                
                let mediaHtml;
                if (!isVideo) {
                    mediaHtml = `<img src="${optimizedUrl}" loading="lazy">`;
                } else {
                    if (item.cloudinaryUrl === 'skipped_due_to_size') {
                        mediaHtml = `<div style="height:100%; display:flex; align-items:center; justify-content:center; background:#161d2f; color:var(--primary); font-weight:800; font-size:0.6rem;">📽️ TG</div>`;
                    } else {
                        mediaHtml = `<video muted loop playsinline preload="auto"><source src="${optimizedUrl}#t=0.5" type="video/mp4"></video>`;
                    }
                }

                card.innerHTML = `
                    <div class="media-wrapper">${mediaHtml}</div>
                    <div class="card-content">
                        <div class="card-title">${item.title || 'Discovery'}</div>
                        <div class="card-meta">
                            <span>${new Date(item.uploadedAt).toLocaleDateString(undefined, {month:'short', day:'numeric'})}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
                setTimeout(() => card.classList.add('visible'), 50);
            });
        }

        function switchTab(tab) {
            if (currentTab === tab && tab !== 'logs') return;
            currentTab = tab;
            document.querySelectorAll('.nav-item').forEach(item => item.classList.toggle('active', item.dataset.tab === tab));
            document.getElementById('gallery-grid').innerHTML = '';
            
            if (tab === 'logs') {
                updateLogs();
                return;
            }

            if (mediaData[tab].length === 0) {
                offset[tab] = 0;
                hasMore[tab] = true;
                fetchMore();
            } else {
                renderNewItems(mediaData[tab]);
            }
        }

        async function handleLogTab() {
            if (!authenticated) {
                const user = prompt("Admin User:");
                const pass = prompt("Admin Pass:");
                const res = await fetch('/api/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user,pass})});
                const data = await res.json();
                if (data.success) { authenticated = true; switchTab('logs'); }
                else alert("Access Denied");
            } else { switchTab('logs'); }
        }

        async function updateLogs() {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '<div id="log-container" style="grid-column: 1/-1; background: #000; padding: 1.5rem; border-radius: 20px; font-family: monospace; font-size: 0.8rem; max-height: 500px; overflow-y: auto; color: #10b981; border: 1px solid var(--glass-border);">Loading...</div>';
            const res = await fetch('/api/logs');
            const logs = await res.json();
            document.getElementById('log-container').innerHTML = logs.map(l => `<div style="margin-bottom:0.4rem;"><span style="color:#64748b;">[${l.time}]</span> ${l.message}</div>`).join('');
        }

        function openViewer(item) {
            const viewer = document.getElementById('viewer');
            const container = document.getElementById('viewer-media-container');
            const isVideo = item.cloudinaryUrl.includes('.mp4') || item.type === 'videos';
            container.innerHTML = '';
            document.getElementById('timeline').style.display = isVideo ? 'block' : 'none';

            if (isVideo && item.cloudinaryUrl !== 'skipped_due_to_size') {
                const video = document.createElement('video');
                video.id = 'viewer-content';
                video.src = item.cloudinaryUrl;
                video.autoplay = true; video.loop = true; video.playsInline = true;
                video.ontimeupdate = () => {
                    const prog = (video.currentTime / video.duration) * 100;
                    document.getElementById('progress').style.width = prog + '%';
                };
                container.appendChild(video);
            } else if (item.cloudinaryUrl === 'skipped_due_to_size') {
                container.innerHTML = `<div style="color:white; text-align:center;"><h2>Telegram File</h2></div>`;
            } else {
                const img = document.createElement('img');
                img.id = 'viewer-content';
                img.src = item.cloudinaryUrl;
                container.appendChild(img);
            }
            viewer.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeViewer() {
            document.getElementById('viewer').style.display = 'none';
            document.getElementById('viewer-media-container').innerHTML = '';
            document.body.style.overflow = 'auto';
        }

        function updateStats() {
            const total = mediaData.images.length + mediaData.videos.length;
            document.getElementById('total-count').innerText = `${total} Items`;
        }

        window.onscroll = () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) fetchMore();
        };

        fetchMore();
    </script>
</body>
</html>
