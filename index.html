<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Vision | Luxury Media Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-bright: #34d399;
            --primary-glow: rgba(16, 185, 129, 0.5);
            --bg: #05080f;
            --card-bg: #0f1624;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.06);
            --text: #ffffff;
            --text-dim: #94a3b8;
            --accent: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(16, 185, 129, 0.12) 0, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(59, 130, 246, 0.12) 0, transparent 40%);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(5, 8, 15, 0.7);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1.2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.4rem;
            text-transform: uppercase;
            background: linear-gradient(135deg, #10b981, #3b82f6, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            letter-spacing: -0.5px;
        }

        .stats-badge {
            background: var(--glass);
            padding: 0.5rem 1rem;
            border-radius: 14px;
            font-size: 0.8rem;
            border: 1px solid var(--glass-border);
            color: var(--primary-bright);
            font-weight: 700;
        }

        .hero {
            padding: 4rem 5% 2rem;
            text-align: center;
        }

        .hero h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(2.5rem, 10vw, 4rem);
            font-weight: 900;
            margin-bottom: 0.8rem;
            letter-spacing: -2px;
            line-height: 1;
            background: linear-gradient(to bottom, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: var(--text-dim);
            font-size: 1rem;
            max-width: 500px;
            margin: 0 auto 2.5rem;
            font-weight: 300;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 0.6rem;
            margin-bottom: 3rem;
            overflow-x: auto;
            padding: 0.5rem;
            scrollbar-width: none;
        }

        .tabs::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 0.8rem 1.6rem;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 20px var(--primary-glow);
            border-color: transparent;
        }

        .gallery-container {
            padding: 0 5% 4rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; gap: 1.5rem; }
            .hero { padding-top: 2rem; }
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all 0.4s ease;
            opacity: 0;
            transform: translateY(20px);
        }

        .card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: rgba(16, 185, 129, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .media-wrapper {
            aspect-ratio: 1/1;
            overflow: hidden;
            background: #090c15;
            position: relative;
        }

        .media-wrapper img, .media-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .card-content {
            padding: 1.5rem;
        }

        .card-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 0.3rem;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        /* Viewer */
        #viewer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98);
            backdrop-filter: blur(20px);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #viewer-content {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(16, 185, 129, 0.15);
        }

        .close-viewer {
            position: absolute;
            top: 20px; right: 20px;
            width: 44px; height: 44px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        #load-more-trigger {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-weight: 600;
            grid-column: 1/-1;
        }

        /* Loading Skeleton */
        .skeleton {
            background: linear-gradient(90deg, var(--card-bg) 25%, #1e293b 50%, var(--card-bg) 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">NATURE VISION</div>
        <div id="total-count" class="stats-badge">Loading...</div>
    </header>

    <div id="viewer" onclick="closeViewer()">
        <button class="close-viewer">&times;</button>
        <div id="viewer-media-container" style="display:contents"></div>
    </div>

    <section class="hero">
        <h1>Visions of Nature</h1>
        <p>Ultra-premium nature gallery optimized for instant discovery.</p>
        
        <div class="tabs">
            <button class="tab-btn active" data-tab="images" onclick="switchTab('images')">Images</button>
            <button class="tab-btn" data-tab="videos" onclick="switchTab('videos')">Videos</button>
            <button class="tab-btn" data-tab="all" onclick="switchTab('all')">All Library</button>
            <button class="tab-btn" data-tab="logs" onclick="handleLogTab()">System Logs</button>
        </div>
    </section>

    <main class="gallery-container">
        <div id="gallery-grid" class="grid"></div>
        <div id="load-more-trigger">
            <div id="loading-spinner">✨ Exploring more nature...</div>
        </div>
    </main>

    <script>
        let currentTab = 'images';
        let mediaData = { images: [], videos: [], all: [] };
        let offset = { images: 0, videos: 0, all: 0 };
        let isLoading = false;
        let hasMore = { images: true, videos: true, all: true };
        let authenticated = false;
        const LIMIT = 40;

        // Cloudinary Optimization Helper
        function getOptimizedUrl(url, type) {
            if (!url || url === 'skipped_due_to_size') return url;
            if (type === 'video') return url.replace('/upload/', '/upload/f_auto,q_auto,w_800,c_limit/');
            return url.replace('/upload/', '/upload/f_auto,q_auto,w_600,c_limit/');
        }

        async function fetchMore() {
            if (isLoading || !hasMore[currentTab]) return;
            isLoading = true;
            
            try {
                const response = await fetch(`/api/media?limit=${LIMIT}&offset=${offset[currentTab]}`);
                const data = await response.json();
                
                const newImages = data.images || [];
                const newVideos = data.videos || [];
                
                if (currentTab === 'images') {
                    mediaData.images.push(...newImages);
                    if (newImages.length < LIMIT) hasMore.images = false;
                    offset.images += LIMIT;
                    renderNewItems(newImages, 'image');
                } else if (currentTab === 'videos') {
                    mediaData.videos.push(...newVideos);
                    if (newVideos.length < LIMIT) hasMore.videos = false;
                    offset.videos += LIMIT;
                    renderNewItems(newVideos, 'video');
                } else {
                    const combined = [...newImages, ...newVideos];
                    mediaData.all.push(...combined);
                    if (combined.length === 0) hasMore.all = false;
                    offset.all += LIMIT;
                    renderNewItems(combined, 'mixed');
                }
                
                updateStats();
            } catch (error) {
                console.error("Fetch error:", error);
            } finally {
                isLoading = false;
            }
        }

        function renderNewItems(items, type) {
            const grid = document.getElementById('gallery-grid');
            items.forEach((item) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openViewer(item);
                
                const isVideo = item.cloudinaryUrl.includes('.mp4') || item.type === 'videos';
                const optimizedUrl = getOptimizedUrl(item.cloudinaryUrl, isVideo ? 'video' : 'image');
                
                let mediaHtml;
                if (!isVideo) {
                    mediaHtml = `<img src="${optimizedUrl}" loading="lazy">`;
                } else {
                    if (item.cloudinaryUrl === 'skipped_due_to_size') {
                        mediaHtml = `<div style="height:100%; display:flex; align-items:center; justify-content:center; background:#161d2f; color:var(--primary); font-weight:800;">📽️ TELEGRAM</div>`;
                    } else {
                        mediaHtml = `<video muted onmouseover="this.play()" onmouseout="this.pause()"><source src="${optimizedUrl}#t=0.5" type="video/mp4"></video>`;
                    }
                }

                card.innerHTML = `
                    <div class="media-wrapper">${mediaHtml}</div>
                    <div class="card-content">
                        <div class="card-title">${item.title || 'Nature Clip'}</div>
                        <div class="card-meta">
                            <span>${new Date(item.uploadedAt).toLocaleDateString()}</span>
                            <span style="color:var(--primary)">EXPLORE</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
                setTimeout(() => card.classList.add('visible'), 50);
            });
        }

        function switchTab(tab) {
            if (currentTab === tab) return;
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
            document.getElementById('gallery-grid').innerHTML = '';
            if (mediaData[tab].length === 0) {
                offset[tab] = 0;
                hasMore[tab] = true;
                fetchMore();
            } else {
                renderNewItems(mediaData[tab], tab);
            }
        }

        async function handleLogTab() {
            if (!authenticated) {
                const user = prompt("Admin User:");
                const pass = prompt("Admin Pass:");
                const res = await fetch('/api/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user,pass})});
                const data = await res.json();
                if (data.success) { authenticated = true; switchTab('logs'); }
                else alert("Access Denied");
            } else { switchTab('logs'); }
        }

        function openViewer(item) {
            const viewer = document.getElementById('viewer');
            const container = document.getElementById('viewer-media-container');
            const isVideo = item.cloudinaryUrl.includes('.mp4') || item.type === 'videos';
            
            if (item.cloudinaryUrl === 'skipped_due_to_size') {
                container.innerHTML = `<div style="color:white; text-align:center;"><h2>Telegram Large File</h2></div>`;
            } else if (isVideo) {
                container.innerHTML = `<video id="viewer-content" controls autoplay src="${item.cloudinaryUrl}"></video>`;
            } else {
                container.innerHTML = `<img id="viewer-content" src="${item.cloudinaryUrl}">`;
            }
            viewer.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeViewer() {
            document.getElementById('viewer').style.display = 'none';
            document.getElementById('viewer-media-container').innerHTML = '';
            document.body.style.overflow = 'auto';
        }

        function updateStats() {
            document.getElementById('total-count').innerText = `${mediaData.images.length + mediaData.videos.length} Discoveries`;
        }

        // Infinite Scroll
        window.onscroll = () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
                fetchMore();
            }
        };

        // Initial Load
        fetchMore();
    </script>
</body>
</html>
